# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Rule-based candidate ranker with explainable multi-signal scoring. Six scoring
  components — semantic relevance (weighted keyword matching with synonym expansion),
  career relevance (tiered evidence from job descriptions), experience fit
  (years + title + retrieval depth), behavioral signals (recruiter response rate,
  interview completion, GitHub activity, recruiter saves), and availability signals
  (open-to-work, notice period, relocation, work mode) — combined via a weighted
  sum (0.25 semantic + 0.25 career + 0.20 behavior + 0.15 experience + 0.15
  availability). A honeypot consistency multiplier penalizes fabricated profiles
  by detecting non-tech titles with expert AI skills, zero-duration expert claims,
  title-career mismatches, impossible experience timelines, and keyword stuffing.
  A curated synonym registry expands all keyword sets with domain-equivalent terms.
  Runtime is under 15 seconds for 100K candidates on CPU with no network access.

